<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý hệ thống CellphoneS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-4">
        <h2 class="text-danger text-center">HỆ THỐNG QUẢN LÝ SẢN PHẨM CELLPHONE S</h2>
        
        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-danger text-white">Thêm / Cập nhật Sản phẩm</div>
                    <div class="card-body">
                        <form id="productForm">
                            <input type="hidden" id="productId">
                            <div class="mb-2">
                                <label class="form-label fw-bold">Mã Sản Phẩm</label>
                                <input type="text" id="productCode" class="form-control" placeholder="VD: IP16PM-256-BK" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label fw-bold">Tên điện thoại / Phụ kiện</label>
                                <input type="text" id="name" class="form-control" required>
                            </div>
                            <div class="row">
                                <div class="col-6 mb-2">
                                    <label class="form-label fw-bold">Phân loại</label>
                                    <select id="category" class="form-select">
                                        <option value="Điện thoại">Điện thoại</option>
                                        <option value="Máy tính bảng">Máy tính bảng</option>
                                        <option value="Phụ kiện">Phụ kiện</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-2">
                                <label class="form-label fw-bold">Giá bán (VNĐ)</label>
                                <input type="number" id="price" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Mô tả ngắn</label>
                                <textarea id="description" class="form-control" rows="2"></textarea>
                            </div>
                            <button type="submit" class="btn btn-danger w-100">Lưu sản phẩm</button>
                            <button type="button" class="btn btn-secondary w-100 mt-2" onclick="resetForm()">Hủy bỏ</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="d-flex gap-2 mb-3">
    <input type="text" id="searchInput" class="form-control" placeholder="Nhập tên điện thoại để tìm kiếm...">
    
    <select id="sortSelect" class="form-select" style="width: 220px; font-weight: bold;">
        <option value="default">Sắp xếp theo giá...</option>
        <option value="asc">Giá: Thấp đến Cao ⬆️</option>
        <option value="desc">Giá: Cao xuống Thấp ⬇️</option>
    </select>
</div>
    <div class="table-container">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Mã SP</th>
                            <th>Tên sản phẩm</th>
                            <th>Phân loại</th>
                            <th>Mô tả</th>
                            <th>Giá (VNĐ)</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody">
                        </tbody>
                </table>
    </div>
    <div class="card mb-4 mt-5 border-success">
        <div class="card-header bg-success text-white"><b>Nhập kho hàng hóa</b></div>
        <div class="card-body">
            <form id="inventoryForm" class="row g-3">
                <div class="col-md-5">
                    <label class="form-label text-muted">1. Chọn Sản phẩm</label>
                    <select id="invProductId" class="form-select" required></select>
                </div>
                <div class="col-md-4">
                    <label class="form-label text-muted">2. Chọn Cửa hàng</label>
                    <select id="invStoreId" class="form-select" required></select>
                </div>
                <div class="col-md-2">
                    <label class="form-label text-muted">3. Số lượng</label>
                    <input type="number" id="invQuantity" class="form-control" min="1" required>
                </div>
                <div class="col-md-1 d-flex align-items-end">
                    <button type="submit" class="btn btn-success w-100">Lưu</button>
                </div>
            </form>
        </div>
    </div>
    <div class="mt-5 mb-5">
        <h3 class="mb-3">📦 Báo cáo tồn kho chi nhánh</h3>
        <div class="table-container" style="max-height: 300px;">
            <table class="table table-bordered table-striped mb-0">
                <thead class="table-info" style="position: sticky; top: 0; z-index: 1;">
                    <tr>
                        <th>Tên Sản phẩm</th>
                        <th>Cửa hàng</th>
                        <th>Số lượng tồn (Cái)</th>
                    </tr>
                </thead>
                <tbody id="inventoryTableBody">
                    </tbody>
            </table>
        </div>
    </div>
                <h4 class="mt-4">Bản đồ Cửa hàng tại Hà Nội</h4>
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
